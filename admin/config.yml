backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "gallery"
    label: "Gallery Photos"
    folder: "_gallery"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Collection", name: "collection", widget: "select", options: ["Cosmic Dreams", "Golden Textures", "Monochrome Luxury", "Urban Abstract"] }
      - { label: "Photo", name: "image", widget: "image" }

  - name: "settings"
    label: "Site Content"
    files:
      - label: "Homepage Text"
        name: "homepage"
        file: "_data/homepage.json"
        fields:
          - { label: "Hero Tagline", name: "tagline", widget: "string" }
          - { label: "Hero Description", name: "description", widget: "text" }
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Number", name: "number", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
          - label: "FAQ"
            name: "faq"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }
